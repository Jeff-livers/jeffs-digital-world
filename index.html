<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff's Digital World</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #FFFEFC;
      color: #000000;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 16px;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 48px;
      text-align: center;
      color: #555555;
    }

    /* ── PROJECT LINKS ── rendered from projects.json ── */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .project-link {
      background: #F3F3F4;
      border-radius: 24px;
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .project-link:hover {
      background: #001F69;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .project-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .project-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .project-description {
      font-size: 0.8rem;
      opacity: 0.65;
    }

    .project-arrow {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-left: 16px;
    }

    @media (max-width: 480px) {
      body {
        padding: 32px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Jeff's Digital World</h1>

    <p class="subtitle">take a look at all my fun projects</p>

    <div class="projects" id="projects"></div>

  </div>

  <script>
    fetch('projects.json')
      .then(res => res.json())
      .then(projects => {
        const container = document.getElementById('projects');
        projects.forEach(project => {
          const a = document.createElement('a');
          a.className = 'project-link';
          a.href = project.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.innerHTML = `
            <div class="project-info">
              <span class="project-title">${project.title}</span>
              <span class="project-description">${project.description}</span>
            </div>
            <span class="project-arrow">→</span>
          `;
          container.appendChild(a);
        });
      });
  </script>

</body>
</html>
